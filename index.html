<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pula Monstro - Jogo</title>
    <style>
        /* ESTILO TOTALMENTE LEVE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation; /* Evita zoom no celular */
        }

        body {
            background-color: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* TELA DO JOGO */
        #jogo-tela {
            width: 100%;
            max-width: 400px;
            height: 300px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            background: linear-gradient(#0a0a1a, #1a1a3a);
        }

        /* FUNDO NOTURNO */
        #fundo {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .estrela {
            width: 2px;
            height: 2px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            animation: piscar 2s infinite alternate;
        }

        #lua {
            width: 50px;
            height: 50px;
            background-color: #f0f0d0;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 20px;
            box-shadow: 0 0 20px rgba(240, 240, 208, 0.8);
        }

        #lua-mancha {
            width: 10px;
            height: 10px;
            background-color: #e0e0b0;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* PERSONAGEM - GAROTO */
        #personagem {
            width: 40px;
            height: 40px;
            position: absolute;
            bottom: 20px;
            left: 50px;
        }

        #cabeca {
            width: 20px;
            height: 20px;
            background-color: #f5cba7;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 10px;
        }

        #corpo {
            width: 15px;
            height: 20px;
            background-color: #2980b9;
            position: absolute;
            top: 20px;
            left: 12px;
        }

        /* OBSTÁCULO - MONSTRO */
        .obstaculo {
            width: 35px;
            height: 30px;
            position: absolute;
            bottom: 20px;
        }

        #cabeca-monstro {
            width: 35px;
            height: 20px;
            background-color: #27ae60;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            position: absolute;
            top: 0;
        }

        #olhos-monstro {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 5px;
        }

        .olho {
            width: 5px;
            height: 5px;
            background-color: #000;
            border-radius: 50%;
        }

        #corpo-monstro {
            width: 25px;
            height: 10px;
            background-color: #2ecc71;
            margin: 0 auto;
            position: absolute;
            bottom: 0;
            left: 5px;
        }

        /* CHÃO */
        #chao {
            width: 100%;
            height: 20px;
            background-color: #34495e;
            position: absolute;
            bottom: 0;
        }

        /* PONTUAÇÃO */
        #pontuacao {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 5px #fff;
        }

        /* TELA DE INÍCIO/FIM */
        #tela-inicio, #tela-fim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        #tela-fim {
            display: none;
        }

        button {
            padding: 10px 25px;
            background-color: #e67e22;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.8);
        }

        button:hover {
            background-color: #f39c12;
        }

        /* INSTRUÇÕES */
        #instrucoes {
            color: #fff;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
            max-width: 400px;
        }

        /* ANIMAÇÕES */
        @keyframes pulo {
            0% { bottom: 20px; }
            50% { bottom: 100px; }
            100% { bottom: 20px; }
        }

        @keyframes piscar {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="pontuacao">Pontos: 0</div>
    <div id="jogo-tela">
        <!-- FUNDO NOTURNO -->
        <div id="fundo"></div>
        <div id="lua">
            <div id="lua-mancha"></div>
        </div>
        
        <!-- CHÃO -->
        <div id="chao"></div>
        
        <!-- PERSONAGEM - GAROTO -->
        <div id="personagem">
            <div id="cabeca"></div>
            <div id="corpo"></div>
        </div>
        
        <!-- TELA DE INÍCIO -->
        <div id="tela-inicio">
            <h1>PULA MONSTRO!</h1>
            <p>PC: Tecla ESPAÇO | Celular: Toque na tela</p>
            <button id="btn-iniciar">Iniciar Jogo</button>
        </div>

        <!-- TELA DE FIM -->
        <div id="tela-fim">
            <h1>Fim de Jogo!</h1>
            <p id="pontos-finais">Pontos: 0</p>
            <button id="btn-reiniciar">Jogar Novamente</button>
        </div>
    </div>
    <div id="instrucoes">
        <p>• Fuja dos monstros para ganhar pontos!</p>
        <p>• Quanto mais pontos, mais rápido ficam os monstros!</p>
    </div>

    <script>
        // ELEMENTOS DO JOGO
        const jogoTela = document.getElementById('jogo-tela');
        const personagem = document.getElementById('personagem');
        const pontuacaoTexto = document.getElementById('pontuacao');
        const telaInicio = document.getElementById('tela-inicio');
        const telaFim = document.getElementById('tela-fim');
        const pontosFinais = document.getElementById('pontos-finais');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const fundo = document.getElementById('fundo');

        // VARIÁVEIS DO JOGO
        let pontuacao = 0;
        let jogoRodando = false;
        let velocidadeObstaculos = 3;
        let intervaloObstaculos;
        let intervaloPontos;

        // CRIAR ESTRELAS NO FUNDO
        function criarEstrelas() {
            for (let i = 0; i < 30; i++) {
                const estrela = document.createElement('div');
                estrela.classList.add('estrela');
                estrela.style.left = Math.random() * 100 + '%';
                estrela.style.top = Math.random() * 80 + '%';
                estrela.style.animationDelay = Math.random() * 2 + 's';
                fundo.appendChild(estrela);
            }
        }

        // FUNÇÃO PARA PULAR
        function pular() {
            if (!jogoRodando) return;
            
            if (!personagem.style.animation) {
                personagem.style.animation = 'pulo 0.5s linear';
                setTimeout(() => {
                    personagem.style.animation = '';
                }, 500);
            }
        }

        // CRIAR OBSTÁCULOS - MONSTROS
        function criarObstaculo() {
            if (!jogoRodando) return;

            const obstaculo = document.createElement('div');
            obstaculo.classList.add('obstaculo');
            
            // Estrutura do monstro
            obstaculo.innerHTML = `
                <div id="cabeca-monstro">
                    <div id="olhos-monstro">
                        <div class="olho"></div>
                        <div class="olho"></div>
                    </div>
                </div>
                <div id="corpo-monstro"></div>
            `;

            jogoTela.appendChild(obstaculo);

            // Posição aleatória na tela
            let posicaoX = jogoTela.offsetWidth;
            obstaculo.style.left = posicaoX + 'px';

            // Mover obstáculo
            const moverObstaculo = setInterval(() => {
                if (!jogoRodando) {
                    clearInterval(moverObstaculo);
                    return;
                }

                posicaoX -= velocidadeObstaculos;
                obstaculo.style.left = posicaoX + 'px';

                // Remover obstáculo quando sair da tela
                if (posicaoX < -35) {
                    clearInterval(moverObstaculo);
                    jogoTela.removeChild(obstaculo);
                }

                // VERIFICAR COLISÃO
                const personagemRect = personagem.getBoundingClientRect();
                const obstaculoRect = obstaculo.getBoundingClientRect();
                const jogoRect = jogoTela.getBoundingClientRect();

                // Ajustar coordenadas para o jogo
                const pTop = personagemRect.top - jogoRect.top;
                const pBottom = personagemRect.bottom - jogoRect.top;
                const pLeft = personagemRect.left - jogoRect.left;
                const pRight = personagemRect.right - jogoRect.left;

                const oTop = obstaculoRect.top - jogoRect.top;
                const oBottom = obstaculoRect.bottom - jogoRect.top;
                const oLeft = obstaculoRect.left - jogoRect.left;
                const oRight = obstaculoRect.right - jogoRect.left;

                if (
                    pBottom > oTop &&
                    pTop < oBottom &&
                    pRight > oLeft &&
                    pLeft < oRight
                ) {
                    jogoOver();
                }
            }, 10);
        }

        // AUMENTAR PONTUAÇÃO
        function aumentarPontuacao() {
            pontuacao++;
            pontuacaoTexto.textContent = `Pontos: ${pontuacao}`;

            // Aumentar velocidade aos 10, 20, 30 pontos...
            if (pontuacao % 10 === 0) {
                velocidadeObstaculos += 0.5;
                clearInterval(intervaloObstaculos);
                intervaloObstaculos = setInterval(criarObstaculo, 2000 - (pontuacao * 10));
            }
        }

        // INICIAR JOGO
        function iniciarJogo() {
            // Resetar tudo
            pontuacao = 0;
            velocidadeObstaculos = 3;
            pontuacaoTexto.textContent = `Pontos: ${pontuacao}`;
            telaInicio.style.display = 'none';
            telaFim.style.display = 'none';
            jogoRodando = true;

            // Remover monstros antigos
            const obstaculosAntigos = document.querySelectorAll('.obstaculo');
            obstaculosAntigos.forEach(obs => jogoTela.removeChild(obs));

            // Criar estrelas se não existirem
            if (fundo.children.length === 0) {
                criarEstrelas();
            }

            // Iniciar criação de obstáculos e pontuação
            intervaloObstaculos = setInterval(criarObstaculo, 2000);
            intervaloPontos = setInterval(aumentarPontuacao, 500);
        }

        // FIM DE JOGO
        function jogoOver() {
            jogoRodando = false;
            clearInterval(intervaloObstaculos);
            clearInterval(intervaloPontos);

            // Mostrar tela de fim
            pontosFinais.textContent = `Pontos: ${pontuacao}`;
            telaFim.style.display = 'flex';
        }

        // EVENTOS
        btnIniciar.addEventListener('click', iniciarJogo);
        btnReiniciar.addEventListener('click', iniciarJogo);

        // Pular com tecla ESPAÇO (PC)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                pular();
            }
        });

        // Pular com toque (celular)
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pular();
        });

        // Clique na tela também pula (PC opcional)
        document.addEventListener('click', pular);

        // Criar estrelas ao carregar a página
        criarEstrelas();
    </script>
</body>
</html>
