<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação Simples com JS</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
            margin: 0;
            font-family: Arial;
        }

        #elemento {
            width: 100px;
            height: 100px;
            background: #2980b9;
            /* Faz a transição ficar suave */
            transition: all 0.5s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        p {
            color: #333;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div id="elemento"></div>
    <p>Clique no elemento ou na tela para mudá-lo!</p>

    <script>
        // Seleciona o elemento que vamos animar
        const elemento = document.getElementById('elemento');
        const cores = ['#2980b9', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6'];
        const formas = ['square', 'circle', 'triangle', 'rectangle'];

        // Função que cria a animação
        function animar() {
            // Muda a posição aleatoriamente na tela
            const posX = Math.random() * (window.innerWidth - 100);
            const posY = Math.random() * (window.innerHeight - 100);
            elemento.style.position = 'absolute';
            elemento.style.left = `${posX}px`;
            elemento.style.top = `${posY}px`;

            // Muda a cor
            const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
            elemento.style.background = corAleatoria;

            // Muda a forma
            const formaAleatoria = formas[Math.floor(Math.random() * formas.length)];
            switch(formaAleatoria) {
                case 'square':
                    elemento.style.width = '100px';
                    elemento.style.height = '100px';
                    elemento.style.borderRadius = '0';
                    elemento.style.clipPath = 'none';
                    break;
                case 'circle':
                    elemento.style.width = '100px';
                    elemento.style.height = '100px';
                    elemento.style.borderRadius = '50%';
                    elemento.style.clipPath = 'none';
                    break;
                case 'triangle':
                    elemento.style.width = '100px';
                    elemento.style.height = '100px';
                    elemento.style.borderRadius = '0';
                    elemento.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
                    break;
                case 'rectangle':
                    elemento.style.width = '150px';
                    elemento.style.height = '80px';
                    elemento.style.borderRadius = '10px';
                    elemento.style.clipPath = 'none';
                    break;
            }

            // Adiciona um girozinho
            const rotacao = Math.random() * 360;
            elemento.style.transform = `rotate(${rotacao}deg)`;
        }

        // Chama a animação ao clicar no elemento ou na tela
        elemento.addEventListener('click', animar);
        document.addEventListener('click', (e) => {
            // Se clicar fora do elemento, também anima
            if(e.target !== elemento) animar();
        });

        // Anima automaticamente ao carregar a página
        animar();
    </script>
</body>
</html>
