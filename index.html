<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pula Monstro - Jogo Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial;
        }

        #jogo {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: linear-gradient(#0a0a1a, #1a1a3a);
            position: relative;
            border: 2px solid white;
            overflow: hidden;
        }

        #personagem {
            width: 40px;
            height: 40px;
            position: absolute;
            bottom: 20px;
            left: 50px;
        }

        #personagem div {
            width: 20px;
            height: 20px;
            background: #f5cba7;
            border-radius: 50%;
            margin: 0 auto;
        }

        #personagem div + div {
            width: 15px;
            height: 20px;
            background: #2980b9;
            border-radius: 0;
            margin-top: 2px;
        }

        .monstro {
            width: 35px;
            height: 30px;
            background: #27ae60;
            position: absolute;
            bottom: 20px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .moeda {
            width: 20px;
            height: 20px;
            background: #f1c40f;
            border-radius: 50%;
            position: absolute;
            bottom: 50px;
            animation: girar 1s infinite linear;
        }

        #chao {
            width: 100%;
            height: 20px;
            background: #34495e;
            position: absolute;
            bottom: 0;
        }

        #info {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            gap: 20px;
        }

        #tela-inicio, #tela-fim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #tela-fim {
            display: none;
        }

        button {
            padding: 10px 25px;
            background: #e67e22;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        @keyframes pulo {
            0% { bottom: 20px; }
            50% { bottom: 100px; }
            100% { bottom: 20px; }
        }

        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="info">
        <span>Pontos: <span id="pontos">0</span></span>
        <span>Moedas: <span id="moedas">0</span></span>
    </div>

    <div id="jogo">
        <div id="chao"></div>
        <div id="personagem">
            <div></div>
            <div></div>
        </div>

        <div id="tela-inicio">
            <h1>PULA MONSTRO!</h1>
            <p>ESPAÇO (PC) ou TOQUE (CELULAR)</p>
            <button id="iniciar">INICIAR</button>
        </div>

        <div id="tela-fim">
            <h1>FIM DE JOGO!</h1>
            <p>Pontos: <span id="pontos-fim">0</span></p>
            <p>Moedas: <span id="moedas-fim">0</span></p>
            <button id="reiniciar">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        // ELEMENTOS BASICOS
        const jogo = document.getElementById('jogo');
        const personagem = document.getElementById('personagem');
        const iniciarBtn = document.getElementById('iniciar');
        const reiniciarBtn = document.getElementById('reiniciar');
        const telaInicio = document.getElementById('tela-inicio');
        const telaFim = document.getElementById('tela-fim');
        const pontosTexto = document.getElementById('pontos');
        const moedasTexto = document.getElementById('moedas');
        const pontosFimTexto = document.getElementById('pontos-fim');
        const moedasFimTexto = document.getElementById('moedas-fim');

        // VARIAVEIS DO JOGO
        let pontos = 0;
        let moedas = 0;
        let jogoAtivo = false;
        let velocidade = 3;

        // FUNCAO DE PULAR
        function pular() {
            if(!jogoAtivo) return;
            if(personagem.style.animation) return;
            personagem.style.animation = 'pulo 0.7s ease';
            setTimeout(() => personagem.style.animation = '', 700);
        }

        // CRIAR MONSTROS
        function criarMonstro() {
            if(!jogoAtivo) return;

            const monstro = document.createElement('div');
            monstro.classList.add('monstro');
            monstro.style.left = '400px';
            jogo.appendChild(monstro);

            const mover = setInterval(() => {
                if(!jogoAtivo) {
                    clearInterval(mover);
                    return;
                }

                let pos = parseFloat(monstro.style.left) || 400;
                if(pos < -35) {
                    jogo.removeChild(monstro);
                    clearInterval(mover);
                    pontos++;
                    pontosTexto.textContent = pontos;
                } else {
                    monstro.style.left = (pos - velocidade) + 'px';
                }

                // VERIFICAR COLISAO
                const pRect = personagem.getBoundingClientRect();
                const mRect = monstro.getBoundingClientRect();
                const jRect = jogo.getBoundingClientRect();

                const pTop = pRect.top - jRect.top;
                const pBottom = pRect.bottom - jRect.top;
                const pLeft = pRect.left - jRect.left;
                const pRight = pRect.right - jRect.left;

                const mTop = mRect.top - jRect.top;
                const mBottom = mRect.bottom - jRect.top;
                const mLeft = mRect.left - jRect.left;
                const mRight = mRect.right - jRect.left;

                if(pBottom > mTop && pTop < mBottom && pRight > mLeft && pLeft < mRight) {
                    jogoAtivo = false;
                    pontosFimTexto.textContent = pontos;
                    moedasFimTexto.textContent = moedas;
                    telaFim.style.display = 'flex';
                    clearInterval(mover);
                    clearInterval(intervaloMonstros);
                    clearInterval(intervaloMoedas);
                }
            }, 10);
        }

        // CRIAR MOEDAS
        function criarMoeda() {
            if(!jogoAtivo) return;

            const moeda = document.createElement('div');
            moeda.classList.add('moeda');
            moeda.style.left = '400px';
            jogo.appendChild(moeda);

            const mover = setInterval(() => {
                if(!jogoAtivo) {
                    clearInterval(mover);
                    return;
                }

                let pos = parseFloat(moeda.style.left) || 400;
                if(pos < -20) {
                    jogo.removeChild(moeda);
                    clearInterval(mover);
                } else {
                    moeda.style.left = (pos - velocidade) + 'px';
                }

                // VERIFICAR COLETA
                const pRect = personagem.getBoundingClientRect();
                const moRect = moeda.getBoundingClientRect();
                const jRect = jogo.getBoundingClientRect();

                const pTop = pRect.top - jRect.top;
                const pBottom = pRect.bottom - jRect.top;
                const pLeft = pRect.left - jRect.left;
                const pRight = pRect.right - jRect.left;

                const moTop = moRect.top - jRect.top;
                const moBottom = moRect.bottom - jRect.top;
                const moLeft = moRect.left - jRect.left;
                const moRight = moRect.right - jRect.left;

                if(pBottom > moTop && pTop < moBottom && pRight > moLeft && pLeft < moRight) {
                    jogo.removeChild(moeda);
                    clearInterval(mover);
                    moedas++;
                    moedasTexto.textContent = moedas;
                }
            }, 10);
        }

        // INICIAR JOGO
        function iniciarJogo() {
            pontos = 0;
            moedas = 0;
            velocidade = 3;
            jogoAtivo = true;

            pontosTexto.textContent = 0;
            moedasTexto.textContent = 0;
            telaInicio.style.display = 'none';
            telaFim.style.display = 'none';

            // LIMPAR ELEMENTOS ANTIGOS
            const elementosAntigos = jogo.querySelectorAll('.monstro, .moeda');
            elementosAntigos.forEach(el => jogo.removeChild(el));

            // INICIAR INTERVALOS
            intervaloMonstros = setInterval(criarMonstro, 2000);
            intervaloMoedas = setInterval(criarMoeda, 4000);

            // AUMENTAR VELOCIDADE
            setInterval(() => {
                if(jogoAtivo) velocidade += 0.2;
            }, 10000);
        }

        // EVENTOS
        iniciarBtn.addEventListener('click', iniciarJogo);
        reiniciarBtn.addEventListener('click', iniciarJogo);

        // PULAR COM ESPACO OU TOQUE
        document.addEventListener('keydown', e => {
            if(e.code === 'Space') pular();
        });

        document.addEventListener('touchstart', e => {
            e.preventDefault();
            pular();
        });

        document.addEventListener('click', () => {
            pular();
        });
    </script>
</body>
</html>
