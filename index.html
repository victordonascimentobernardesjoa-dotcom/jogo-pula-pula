<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pula Monstro - Aventura Noturna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            padding: 10px;
        }

        /* CABEÇALHO */
        #cabecalho {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #placar {
            display: flex;
            gap: 15px;
            font-size: 1rem;
        }

        #vidas {
            display: flex;
            gap: 5px;
        }

        .vida {
            width: 18px;
            height: 18px;
            background: #e74c3c;
            border-radius: 50%;
        }

        .vida-vazia { background: #34495e; }

        #recordes {
            font-size: 0.8rem;
            text-align: right;
        }

        /* BOTÃO DA LOJA */
        #btn-loja {
            padding: 5px 10px;
            background: #f1c40f;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        /* TELA DO JOGO */
        #jogo {
            width: 100%;
            max-width: 400px;
            height: 300px;
            position: relative;
            border: 2px solid white;
            overflow: hidden;
            transition: background 1s ease;
            background: linear-gradient(#0a0a1a, #1a1a3a);
        }

        /* ELEMENTOS DO FUNDO */
        .estrela {
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            position: absolute;
            animation: piscar 2s infinite alternate;
        }

        .lua {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 20px;
            box-shadow: 0 0 20px rgba(240, 240, 208, 0.8);
            background: #f0f0d0;
        }

        /* PERSONAGEM */
        #personagem {
            width: 40px;
            height: 40px;
            position: absolute;
            bottom: 20px;
            left: 50px;
            z-index: 10;
        }

        .personagem-escudo { box-shadow: 0 0 15px rgba(52, 152, 219, 0.8); border-radius: 50%; }

        #cabeca {
            width: 20px;
            height: 20px;
            background: #f5cba7;
            border-radius: 50%;
            margin: 0 auto;
        }

        #corpo {
            width: 15px;
            height: 20px;
            margin: 2px auto 0;
            background: #2980b9;
        }

        /* OBSTÁCULOS */
        .obstaculo {
            width: 35px;
            height: 30px;
            position: absolute;
            bottom: 20px;
            z-index: 5;
        }

        .monstro1 { background: #27ae60; border-top-left-radius: 15px; border-top-right-radius: 15px; }
        .monstro2 { background: #c0392b; border-radius: 10px; }

        /* ITENS E MOEDAS */
        .item {
            width: 25px;
            height: 25px;
            position: absolute;
            bottom: 55px;
            z-index: 8;
            animation: girar 1s infinite linear;
        }

        .moeda { 
            background: #f1c40f; 
            border-radius: 50%; 
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
        }
        .escudo { background: #3498db; border-radius: 50%; box-shadow: 0 0 10px rgba(52, 152, 219, 0.8); }

        /* CHÃO */
        #chao {
            width: 100%;
            height: 20px;
            position: absolute;
            bottom: 0;
            background: #34495e;
        }

        /* TELAS DE OVERLAY */
        .tela-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 30;
        }

        #tela-inicio { display: flex; }
        #tela-fim { display: none; }
        #tela-loja { display: none; }

        button {
            padding: 10px 25px;
            background: #e67e22;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        button:hover { background: #f39c12; }

        .btn-loja-item {
            padding: 8px 15px;
            background: #f1c40f;
            color: black;
            font-weight: bold;
            margin: 5px;
        }

        .btn-fechar {
            background: #e74c3c;
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 0.9rem;
        }

        /* LOJA */
        #loja-itens {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            max-width: 300px;
        }

        .item-loja {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* INSTRUÇÕES */
        #instrucoes {
            margin-top: 15px;
            text-align: center;
            font-size: 0.8rem;
            max-width: 400px;
        }

        /* ANIMAÇÕES */
        @keyframes pulo {
            0% { bottom: 20px; }
            30% { bottom: 110px; }
            70% { bottom: 110px; }
            100% { bottom: 20px; }
        }

        @keyframes piscar {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="cabecalho">
        <div id="placar">
            <span>Pontos: <span id="pontos">0</span></span>
            <span>Moedas: <span id="moedas">0</span></span>
        </div>
        <div>
            <div id="vidas">
                <div class="vida"></div>
                <div class="vida"></div>
                <div class="vida"></div>
            </div>
            <div id="recordes">
                <span>Recorde: <span id="recorde">0</span></span>
                <button id="btn-loja">LOJA</button>
            </div>
        </div>
    </div>

    <div id="jogo">
        <div id="chao"></div>
        <div class="lua"></div>
        <div id="personagem">
            <div id="cabeca"></div>
            <div id="corpo"></div>
        </div>

        <!-- TELA DE INÍCIO -->
        <div id="tela-inicio" class="tela-overlay">
            <h1>PULA MONSTRO!</h1>
            <p>• TOQUE NA TELA PARA PULAR</p>
            <p>• COLETE MOEDAS E COMPRE NA LOJA!</p>
            <button id="btn-iniciar">INICIAR</button>
        </div>

        <!-- TELA DE FIM -->
        <div id="tela-fim" class="tela-overlay">
            <h1>FIM DE JOGO!</h1>
            <p>Pontos: <span id="pontos-fim">0</span></p>
            <p>Moedas: <span id="moedas-fim">0</span></p>
            <p id="novo-recorde"></p>
            <button id="btn-reiniciar">JOGAR NOVAMENTE</button>
        </div>

        <!-- TELA DA LOJA -->
        <div id="tela-loja" class="tela-overlay">
            <h1>LOJA</h1>
            <p>Moedas: <span id="moedas-loja">0</span></p>
            <div id="loja-itens">
                <div class="item-loja">
                    <span>❤️ Vida Extra - 15</span>
                    <button class="btn-loja-item" data-item="vida" data-preco="15">COMPRAR</button>
                </div>
                <div class="item-loja">
                    <span>💙 Escudo Inicial - 20</span>
                    <button class="btn-loja-item" data-item="escudo" data-preco="20">COMPRAR</button>
                </div>
            </div>
            <button class="btn-fechar" id="btn-fechar-loja">FECHAR</button>
        </div>
    </div>

    <div id="instrucoes">
        <p>💚 Vida - 💛 Moeda - 💙 Escudo</p>
        <p>Jogo otimizado para celular!</p>
    </div>

    <script>
        // ELEMENTOS PRINCIPAIS
        const jogo = document.getElementById('jogo');
        const personagem = document.getElementById('personagem');
        const vidasElementos = document.querySelectorAll('.vida');

        const novoRecordeTexto = document.getElementById('novo-recorde');
        const moedasLojaTexto = document.getElementById('moedas-loja');

        const btnIniciar = document.getElementById('btn-iniciar');

        const btnLoja = document.getElementById('btn-loja');
        const btnFecharLoja = document.getElementById('btn-fechar-loja');
        const btnsLojaItens = document.querySelectorAll('.btn-loja-item');

        const telaInicio = document.getElementById('tela-inicio');

        let pontos = 0;

        let vidas = 3;

        let recorde = localStorage.getItem('pulaMonstroRecorde') || 0;
        recordeTexto.textContent = recorde;

        let itemComprado = '';

        // CRIAR ESTRELAS
        function criarEstrelas() {
            for(let i=0; i<40; i++) {
                const estrela = document.createElement('div');
                estrela.classList.add('estrela');
                estrela.style.left = `${Math.random()*100}%`;
                estrela.style.top = `${Math.random()*80}%`;
                estrela.style.animationDelay = `${Math.random()*2}s`;
                jogo.appendChild(estrela);
            }
        }

        // PULAR - RESPONSIVO
        function pular() {
            if(!jogoAtivo) return;
            if(personagem.style.animation) return;
            personagem.style.animation = 'pulo 0.6s ease';
            setTimeout(() => personagem.style.animation = '', 600);
        }

        // CRIAR OBSTÁCULOS
        function criarObstaculo() {
            if(!jogoAtivo) return;

            const obstaculo = document.createElement('div');
            obstaculo.classList.add('obstaculo');
            const tipo = Math.floor(Math.random()*2) + 1;
            obstaculo.classList.add(`monstro${tipo}`);
            obstaculo.style.left = '100%';
            jogo.appendChild(obstaculo);

            const mover = setInterval(() => {
                if(!jogoAtivo) {
                    clearInterval(mover);
                    return;
                }

                let pos = parseFloat(obstaculo.style.left) || 100;
                if(pos < -5) {
                    jogo.removeChild(obstaculo);
                    clearInterval(mover);
                    pontos++;
                    pontosTexto.textContent = pontos;
                } else {
                    obstaculo.style.left = (pos - velocidade) + '%';
                }

                // VERIFICAR COLISÃO
                const pRect = personagem.getBoundingClientRect();
                const oRect = obstaculo.getBoundingClientRect();
                const jRect = jogo.getBoundingClientRect();

                const pTop = pRect.top - jRect.top;
                const pBottom = pRect.bottom - jRect.top;
                const pLeft = pRect.left - jRect.left;
                const pRight = pRect.right - jRect.left;

                const oTop = oRect.top - jRect.top;
                const oBottom = oRect.bottom - jRect.top;
                const oLeft = oRect.left - jRect.left;
                const oRight = oRect.right - jRect.left;

                if(pBottom > oTop && pTop < oBottom && pRight > oLeft && pLeft < oRight) {
                    if(itemComprado === 'escudo') {
                        itemComprado = '';
                        personagem.classList.remove('personagem-escudo');
                        jogo.removeChild(obstaculo);
                        clearInterval(mover);
                        return;
                    }

                    vidas--;
                    atualizarVidas();
                    jogo.removeChild(obstaculo);
